<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alke Wallet | Deposito</title>

  <!-- Google Fonts -->

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


  <!-- css -->
  <link rel="stylesheet" href="assets/css/style.css">

</head>

<body class="container mt-3">

  <header class="text-center mb-4">

    <h2 class="fw-bold">Depositar dinero</h2>

    <p class="text-secondary">Agrega dinero a tu <strong>ALKE WALLET</strong></p>

  </header>


  <div class="card shadow-sm mb-4" id="alert-container">

    <div class="card-body text-center">

      <h6 class="text-secondary">Saldo disponible</h6>

      <h1 id="saldo-total" class="fw-bold">$60.000</h1>

    </div>

  </div>

  <div class="card shadow-sm">

    <div class="card-body">

      <form id="deposit" class="display-format">

        <div>

          <label class="form-label">Monto a depositar</label>

          <input id="monto" class="form-control" type="number" placeholder="Ej: 20000">

          <div class="invalid-feedback">Ingrese un monto válido.</div>

        </div>

        <div class="d-grid">

          <button class="btn btn-primary">Depositar dinero</button>

        </div>

        <div class="d-grid">

          <a onclick="redirigir('menu.html','Menú principal')" class="btn btn-secondary">Volver al menú</a>

        </div>

      </form>

      <div id="deposit-info" class="text-center mt-4">

      </div>

    </div>

  </div>


  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>

  <script src="assets/js/deposit.js"></script>

</body>

</html>
