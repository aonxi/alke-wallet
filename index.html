<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proyecto_Bootstrap</title>

  <!-- bootstrap css -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

  <!-- css -->
  <link rel="stylesheet" href="css/style.css">

</head>

<body class="container">

  <header>
    <h2 class="mt-3">Inicio de sesión</h2>
  </header>

  <main id="login-page">

    <div id="alert-bootstrap"></div>

    <form id="login" action="#">

      <div>
        <label class="form-label" for="email">Email:</label>
        <input class="form-control" id="email" name="email" type="email" placeholder="usuario@gmail.com">
        
        <!-- mensaje bootstrap -->
        <div class="invalid-feedback">
          Debe ingresar un email.
        </div>
      </div>

      <div>
        <label class="form-label" for="password">Contraseña:</label>
        <input class="form-control" id="password" name="password" type="password" placeholder="contraseña.1">

        <!-- mensaje bootstrap -->
         <div class="invalid-feedback">
          Debe ingresar una contraseña
         </div>
      </div>

      <div class="acciones">
        <!-- Aquí se reemplazo onclick -->
        <button class="btn btn-primary" type="submit">Iniciar</button>
      </div>

      <div>
        <p class="alert alert-secondary text-center">Contraseña y email puestos para que pueda revisar el trabajo</p>
      </div>

    </form>

  </main>

  <!-- bootstrap js -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

  <!-- JQuery -->
  <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>

  <!-- jS (ahora individual) -->
  <script src="java/login.js"></script>

</body>

</html>
