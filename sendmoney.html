<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <!-- bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

  <!-- css -->
  <link rel="stylesheet" href="css/style.css">

</head>

<body class="container mt-3">
  <header>
    <h2>Enviar Dinero</h2>
  </header>

  <div id="alert-container"></div>

  <main id="send-money">

    <form id="sendmoney" action="#" class="form-group">

      <div>
        <label class="form-label" for="search-contact">Buscar en la agenda de transferencias</label>
        <input class="form-control" id="search-contact" name="contact" type="text" placeholder="Buscar contacto">
      </div>

      <div class="acciones"
        <!-- Button trigger modal -->
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#new-contact">
          Agregar nuevo contacto
        </button>

        <!-- Modal agregar contacto-->
        <div class="modal fade" id="new-contact" tabindex="-1" aria-labelledby="add-contact" aria-hidden="true">
          <div class="modal-dialog">
            <div class="modal-content">
              <div class="modal-header">
                <h1 class="modal-title fs-5" id="add-contact">Nuevo contacto</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
              </div>
              <div class="modal-body">

                <div class="mb-3">
                  <label class="form-label" for="name">Nombre: </label>
                  <input class="form-control" id="name" name="name" type="text">
                  <div class="invalid-feedback">Debe ingresar un nombre.</div>
                </div>

                <div class="mb-3">
                  <label class="form-label" for="apellido">Apellido: </label>
                  <input class="form-control" id="lastname" name="lastname" type="text">
                  <div class="invalid-feedback">Debe ingresar un apellido.</div>
                </div>

                <div class="mb-3">
                  <label class="form-label" for="cbu">Número de CBU:</label>
                  <input class="form-control" id="cbu" name="cbu" type="number" inputmode="numeric">
                  <div id="invalid-feedback-cbu" class="invalid-feedback">Debe ingresar un CBU.</div>
                </div>

                <div class="mb-3">
                  <label class="form-label" for="alias">Alias: </label>
                  <input class="form-control" id="alias" name="alias" type="text">
                  <div class="invalid-feedback">Debe ingresar un alias.</div>
                </div>

                <div class="mb-3">
                  <label class="form-label" for="banco">Nombre del Banco:</label>
                  <input class="form-control" id="banco" name="banco" type="text">
                  <div class="invalid-feedback">Debe ingresar un banco.</div>
                </div>

              </div>

              <div class="modal-footer">
                <button id="cerrar-modal" type="button" class="btn btn-secondary"
                  data-bs-dismiss="modal">Cerrar</button>
                <button id="guardar-contacto" type="button" class="btn btn-primary">Guardar
                  cambios</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <h3>Contactos</h3>

      <ul id="contact-list" class="list-group">
        <!-- la deje basia ya que se agregaran contactos desde JavaScript -->
      </ul>

      <div class="acciones">
        <a onclick="redirigir('menu.html', 'menú')" class="btn btn-secondary">← volver a menú</a>

        <!-- ocultamos el boton, en este caso con style ya que considero es un caso muy especifico -->
        <button id="enviar-dinero" class="btn btn-primary" type="button" style="display: none;">Enviar Dinero</button>
      </div>

      <p id="deposit-info" class="text-success fw-bold mt-3"></p>

    </form>
  </main>

  <!-- bootstrap js -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

  <!-- JQuery -->
  <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>

  <!-- jS (ahora individual) -->
  <script src="java/sendmoney.js"></script>

</body>

</html>
