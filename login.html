<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Alke Wallet | Login</title>

  <!-- Google Fonts -->

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap -->

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS -->

  <link rel="stylesheet" href="assets/css/style.css">

</head>

<body class="login-body">

  <div class="container">

    <div class="row justify-content-center align-items-center min-vh-100">

      <div class="col-md-6 col-lg-5">

        <div class="card shadow login-card">

          <div class="card-body p-4">

            <div class="text-center mb-4">

              <h2 class="fw-bold text-primary">

                Alke Wallet

              </h2>

              <p class="text-secondary">

                Bienvenido. Inicia sesión para administrar tu billetera digital.

              </p>

            </div>

            <div id="alert-bootstrap"></div>

            <form id="login" class="display-format">

              <div>

                <label class="form-label">

                  Correo electrónico

                </label>

                <input id="email" class="form-control" type="email" placeholder="ejemplo@gmail.com">

                <div class="invalid-feedback">

                  Debe ingresar un email.

                </div>

              </div>

              <div>

                <label class="form-label">

                  Contraseña

                </label>

                <input id="password" class="form-control" type="password" placeholder="********">

                <div class="invalid-feedback">

                  Debe ingresar una contraseña.

                </div>

              </div>

              <div class="d-grid mt-3">

                <button class="btn btn-primary" type="submit">

                  Iniciar sesión

                </button>

              </div>

              <div class="d-grid mt-2">

                <button id="open-modal" type="button" class="btn btn-outline-primary" data-bs-toggle="modal"
                  data-bs-target="#exampleModal">

                  Crear cuenta

                </button>

              </div>

            </form>

          </div>

        </div>

      </div>

    </div>

  </div>

  <!-- Modal -->

  <div class="modal fade" id="exampleModal">

    <div class="modal-dialog">

      <div class="modal-content">

        <div class="modal-header">

          <h5 class="modal-title">

            Crear cuenta

          </h5>

          <button type="button" class="btn-close" data-bs-dismiss="modal">

          </button>

        </div>

        <div class="modal-body">

          <div class="mb-3">

            <label class="form-label">Correo electrónico</label>
            <input id="email-modal" class="form-control" type="email">
            <div id="feedback-email-modal" class="invalid-feedback">
              Debe ingresar un email.
            </div>

          </div>

          <div class="mb-3">

            <label class="form-label">Contraseña</label>
            <input id="password-modal" class="form-control" type="password">
            <div id="feedback-password-modal" class="invalid-feedback">
              Debe ingresar una contraseña.
            </div>

          </div>

        </div>

        <div class="modal-footer">

          <button id="close-modal" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>

          <button id="create-account" class="btn btn-primary">Registrarse</button>

        </div>

      </div>

    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>

  <script src="assets/js/login.js"></script>

</body>

</html>
